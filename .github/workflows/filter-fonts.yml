name: Filter Cyrillic Fonts

on:
  push:
    branches: [ "main" ]          # ⚠️ Если ваша основная ветка называется master, замените "main" на "master"
  workflow_dispatch:               # позволяет запускать вручную

jobs:
  filter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests

      # Шаг скачивания удалён — используем локальные файлы из fontjoy-data/
      - name: Run filter script
        run: python font-filter/filter_cyrillic.py

      - name: Commit and push results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add font-filter/*.tsv font-filter/*.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update filtered fonts"
          git push
